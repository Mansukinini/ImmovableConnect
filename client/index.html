<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Immovable Connect</title>
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"> -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.13.1/css/all.css"
        integrity="sha384-xxzQGERXS00kBmZW/6qxqJPyxW3UR0BPsL4c8ILaIWXva5kFi7TxkIIaMiKtqV1Q" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@700&display=swap" rel="stylesheet" />
    <style type="text/css">
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Splash Screen Styling */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #0f172a;
            /* Deep Navy/Black */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease-out, visibility 0.8s;
        }

        .logo-text {
            color: #ffffff;
            font-size: 3rem;
            letter-spacing: 4px;
            /* font-weight: 900;
            text-transform: uppercase; */
        }

        .logo-text span {
            color: #38bdf8;
            /* Bright Blue accent */
            font-weight: 300;
        }

        /* Animated Loading Bar */
        .loader-bar {
            width: 0;
            height: 4px;
            background: #38bdf8;
            margin-top: 15px;
            border-radius: 2px;
            animation: load 2s forwards;
        }

        @keyframes load {
            0% {
                width: 0;
            }

            100% {
                width: 100%;
            }
        }

        @media (max-width: 650px) {
            .logo-text {
                color: #ffffff;
                font-size: 1.5rem;
                letter-spacing: 1px;
            }
        }

        /* Content visibility toggle */
        .hidden {
            opacity: 0;
        }

        #main-content {
            padding: 50px;
            text-align: center;
            transition: opacity 1s ease-in;
        }

        /* Class to trigger with JS */
        .fade-out {
            opacity: 0;
            visibility: hidden;
        }
    </style>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const splash = document.getElementById('splash-screen');
            const mainContent = document.getElementById('root');

            // Display splash for 3 seconds
            setTimeout(() => {
                // Add the fade-out class
                splash.classList.add('fade-out');

                // Make main content visible
                mainContent.classList.remove('hidden');
                mainContent.style.opacity = "1";
            }, 5000);
        });
    </script>
</head>

<body>
    <div id="splash-screen">
        <div class="logo-container">
            <h1 class="logo-text">IMMOVABLE <span>CONNECT</span></h1>
            <div class="loader-bar"></div>
        </div>
    </div>
    <div id="root" class="hidden"></div>
    <!-- bundle injected by webpack -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script> -->
</body>

</html>
